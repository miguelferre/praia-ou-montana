name: ingest-catalog

# Catálogo (mensual o manual): playas + curación + horizonte PVGIS + tiempos de
# viaje. ORS_API_KEY es un secret opcional; sin él, los tiempos caen a estimación.
on:
  schedule:
    - cron: '30 4 1 * *' # día 1 de cada mes, 04:30 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  catalog:
    runs-on: ubuntu-latest
    env:
      ORS_API_KEY: ${{ secrets.ORS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r scripts/ingest/requirements.txt
      - run: python scripts/ingest/build_catalog.py --wfs
      - run: python scripts/ingest/build_services.py
      - run: python scripts/ingest/build_routes.py
      # --all: repone el perfil de horizonte de las playas nuevas del IDE (salta las ya
      # cacheadas). Sin él, cada ciclo re-añade playas sin puesta efectiva, el diferenciador.
      - run: python scripts/ingest/fetch_horizon.py --all
      - run: python scripts/ingest/build_travel.py
      # Post-proceso: cada build reintroduce desde el IDE los casi-duplicados y un
      # banderaAzul histórico (~2024). Se reconcilia contra la lista oficial del año
      # y se funden los duplicados, para que las correcciones sobrevivan a la ingesta.
      - run: python scripts/ingest/reconcile_blue_flags.py --apply
      - run: python scripts/ingest/dedup_playas.py --apply
      - name: Validar catálogo (aborta antes de commitear si está corrupto)
        run: python scripts/ingest/validate_catalog.py
      - name: Commit si cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/catalog
          if git diff --staged --quiet; then
            echo "sin cambios en el catálogo"
          else
            git commit -m "chore: catálogo $(date -u +%F)"
            # El otro workflow (forecast) puede haber empujado entretanto: rebase antes
            # de push. Los ficheros son disjuntos, así que no hay conflicto (F12).
            git pull --rebase origin main
            git push
          fi
